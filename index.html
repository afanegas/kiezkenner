<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/x-icon" href="./favicon.ico" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>KiezKenner – Das Berlin-Lernspiel</title>
  <meta name="description" content="Lerne die Berliner Ortsteile, Quartiere, Planungsräume (PLR), Bahnhöfe und Straßen spielerisch kennen." />

  <!-- Google Fonts for Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@latest/dist/maplibre-gl.js"></script>

  <style>
    #custom-tooltip {
      position: absolute;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -150%) scale(0.95);
      transition: opacity 0.2s cubic-bezier(0.16, 1, 0.3, 1), transform 0.2s cubic-bezier(0.16, 1, 0.3, 1);
      opacity: 0;
    }

    #custom-tooltip.visible {
      opacity: 1;
      transform: translate(-50%, -150%) scale(1);
    }

    .modern-popup {
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      color: #ffffff;
      border: 1px solid rgba(255, 255, 255, 0.15);
      padding: 6px 14px;
      border-radius: 9999px;
      font-size: 0.9rem;
      font-weight: 600;
      letter-spacing: 0.02em;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3), 0 4px 6px -4px rgba(0, 0, 0, 0.2);
      white-space: nowrap;
    }

    .modern-popup.error {
      background: rgba(220, 38, 38, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
  </style>

  <link rel="stylesheet" href="./style.css?v=3">
</head>

<body>
  <!-- App Container -->
  <main id="app">
    <!-- Info Overlay -->
    <header id="info-panel" class="glass-panel">
      <!-- Game Mode Picker (2 lines of buttons) -->
      <div class="game-mode-picker">
        <div class="mode-picker-row">
          <button class="game-mode-btn active" data-gamemode="ortsteile">Ortsteile</button>
          <button class="game-mode-btn" data-gamemode="quartier">Quartiere</button>
          <button class="game-mode-btn" data-gamemode="plr">PLR</button>
        </div>
        <div class="mode-picker-row">
          <button class="game-mode-btn" data-gamemode="stations">Bahnhöfe</button>
          <button class="game-mode-btn" data-gamemode="streets">Straßen</button>
        </div>
      </div>

      <!-- Menu & Mode Switcher -->
      <div style="display: flex; justify-content: space-between; align-items: stretch; margin-bottom: 12px;">
        <!-- Mode Switcher -->
        <div class="mode-switcher" style="margin-bottom: 0; flex: 1; display: flex; align-items: center;">
          <button id="btn-lernen" class="mode-btn active">Lernen</button>
          <button id="btn-spielen" class="mode-btn">Spielen</button>
          <button id="btn-skip-target" title="Überspringen"
            style="background: transparent; border: none; color: white; width: 36px; height: 36px; cursor: pointer; display: none; align-items: center; justify-content: center; margin-left: 4px; transition: opacity 0.3s; opacity: 0.8;"
            onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <polygon points="5 4 15 12 5 20 5 4"></polygon>
              <line x1="19" y1="5" x2="19" y2="19"></line>
            </svg>
          </button>
          <button id="btn-restart-game" title="Spiel neu starten"
            style="background: transparent; border: none; color: white; width: 36px; height: 36px; cursor: pointer; display: none; align-items: center; justify-content: center; margin-left: 4px; transition: opacity 0.3s; opacity: 0.8;"
            onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.8'">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
              stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path>
              <path d="M3 3v5h5"></path>
            </svg>
          </button>
        </div>

        <!-- Settings Dropdown Toggle -->
        <div class="settings-container"
          style="position: relative; margin-left: 12px; display: flex; align-items: stretch;">
          <button id="btn-settings" title="Einstellungen"
            style="background: rgba(0,0,0,0.3); border: none; color: white; border-radius: 8px; width: 44px; height: auto; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1.2rem;">⚙️</button>
          <div id="settings-menu" class="glass-panel hidden"
            style="padding: 16px; border-radius: 12px; display: flex; flex-direction: column; gap: 12px;">
            
            <button id="btn-close-settings" title="Schließen"
              style="position: absolute; top: 0; left: 50%; transform: translateX(-50%); background: transparent; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 12px; font-size: 0.8rem; opacity: 0.6; transition: opacity 0.2s;"
              onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.6'">▼</button>

            <!-- Difficulty Settings (Streets only) -->
            <div id="difficulty-setting-group" style="display: flex; flex-direction: column; gap: 4px;">
              <label for="difficulty-select"
                style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">Schwierigkeit:</label>
              <select id="difficulty-select" class="dropdown-select">
                <option value="1">Tourist (Hauptstraßen)</option>
                <option value="2">Anwohner (+ Nebenstraßen)</option>
                <option value="3">Taxifahrer (Alle Wege)</option>
              </select>
            </div>

            <!-- Region Settings -->
            <div style="display: flex; flex-direction: column; gap: 4px;">
              <label for="region-select"
                style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">Auswahl der Region:</label>
              <select id="region-select" class="dropdown-select">
                <!-- Dynamically populated based on active game mode -->
              </select>
              <button id="btn-config-filter" class="action-btn hidden"
                style="padding: 6px; font-size: 0.8rem; margin-top: 4px;">Karte laden / erstellen</button>

              <!-- Radius Config (Streets only) -->
              <div id="radius-config" class="hidden"
                style="display: flex; flex-direction: column; gap: 8px; margin-top: 8px; padding: 8px; background: rgba(0,0,0,0.2); border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);">
                <label for="radius-slider"
                  style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">Radius: <span
                    id="radius-display">2</span> km</label>
                <input type="range" id="radius-slider" min="0.5" max="5" step="0.5" value="2"
                  style="width: 100%; accent-color: var(--accent-color);" />
                <button id="btn-select-center" class="action-btn" style="padding: 6px; font-size: 0.8rem;">Zentrum auf
                  Karte wählen</button>
              </div>
            </div>

            <!-- Global / Toggle Toggles -->
            <label
              style="display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);">
              <input type="checkbox" id="toggle-error-names" style="margin-right: 8px;" checked>
              Namen bei Fehler zeigen
            </label>

            <!-- Show names on answered elements (Streets only) -->
            <label id="toggle-hover-red-group"
              style="display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);">
              <input type="checkbox" id="toggle-hover-red" style="margin-right: 8px;" checked>
              Namen bei beantworteten Elementen zeigen
            </label>

            <label
              style="display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; color: var(--text-primary);">
              <input type="checkbox" id="toggle-map-labels" style="margin-right: 8px;">
              Kartenbeschriftung zeigen
            </label>

            <!-- Map Style Select (Streets only) -->
            <div id="map-style-setting-group" style="display: flex; flex-direction: column; gap: 4px; margin-top: 4px;">
              <label for="map-style-select"
                style="font-size: 0.85rem; color: var(--text-secondary); font-weight: 600;">Karten-Stil:</label>
              <select id="map-style-select" class="dropdown-select">
                <option value="light">Positron (Hell)</option>
                <option value="dark">Dark Matter (Dunkel)</option>
                <option value="voyager" selected>Voyager (Bunt)</option>
              </select>
            </div>
          </div>
        </div>
      </div>

      <div id="lernen-content">
        <h1 id="bezirk-title">Berlin</h1>
        <p id="ortsteil-name">Wähle einen Ortsteil</p>
      </div>

      <div id="spielen-content" class="hidden">
        <p class="spielen-prompt">Finde:</p>
        <h1 id="target-name">Mitte</h1>
        <div class="game-status">
          <div id="chances" class="chances">
            <span class="chance dot"></span>
            <span class="chance dot"></span>
            <span class="chance dot"></span>
          </div>
          <span id="progress-text">0/0</span>
        </div>
      </div>
    </header>

    <!-- Map Container -->
    <div id="map"></div>

    <!-- Statistics Modal -->
    <div id="stats-modal" class="modal-overlay hidden">
      <div class="modal-content glass-panel">
        <h2>Statistik</h2>
        <div class="stats-grid">
          <div class="stat-box"><span class="stat-value" id="stat-time">00:00</span><span class="stat-label">Zeit</span>
          </div>
          <div class="stat-box green"><span class="stat-value" id="stat-green">0</span><span class="stat-label">1.
              Versuch</span></div>
          <div class="stat-box orange"><span class="stat-value" id="stat-orange">0</span><span class="stat-label">2./3.
              Versuch</span></div>
          <div class="stat-box red"><span class="stat-value" id="stat-red">0</span><span
              class="stat-label">Fehler</span></div>
        </div>
        <div style="display: flex; gap: 12px; margin-top: 16px;">
          <button id="btn-restart" class="action-btn" style="flex: 1;">Neu Spielen</button>
          <button id="btn-close-stats" class="action-btn" style="flex: 1; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); box-shadow: none;">Schließen</button>
        </div>
      </div>
    </div>

    <!-- Custom Filter Modal (for Ortsteile, PLR, Quartiere checkbox lists) -->
    <div id="filter-modal" class="modal-overlay hidden">
      <div class="modal-content glass-panel" style="max-width: 500px; padding: 20px;">
        <h2 id="filter-modal-title" style="font-size: 1.5rem; margin-bottom: 16px;">Eigene Karte</h2>
        
        <!-- Street Upload UI -->
        <div id="street-upload-ui" class="hidden">
          <p style="font-size: 0.9rem; color: var(--text-secondary); margin-bottom: 20px;">
            Lade eine benutzerdefinierte GeoJSON-Datei hoch, um eigene Orte und Straßen zu lernen.
          </p>

          <div style="margin-bottom: 24px;">
            <input type="file" id="filter-file-upload" accept=".geojson,application/geo+json" style="display: none;" />
            <label for="filter-file-upload" class="action-btn"
              style="text-align: center; display: block; cursor: pointer; padding: 12px; font-size: 0.9rem; background: var(--accent-color);">Karte
              hochladen (.geojson)</label>
            <div id="filter-upload-status" style="margin-top: 8px; font-size: 0.85rem; color: #10b981; display: none;">
              Datei erfolgreich geladen!</div>
          </div>

          <div style="margin-bottom: 24px; text-align: center;">
            <p style="font-size: 0.85rem; color: var(--text-secondary); margin-bottom: 12px;">Keine Datei? Erstelle deine
              eigene Karte:</p>
            <a href="editor.html" target="_blank" class="action-btn"
              style="display: inline-block; background: var(--accent-color); color: white; text-decoration: none; font-size: 0.9rem;">
              Zum Map Editor
            </a>
          </div>
        </div>

        <!-- Polygon Checkbox Filter UI -->
        <div id="polygon-filter-ui" class="hidden">
          <div class="io-section" style="display: flex; gap: 8px; margin-bottom: 12px;">
            <input type="text" id="filter-export-input" readonly placeholder="Export String..." style="flex: 1; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 4px; font-family: monospace; font-size: 0.8rem;" />
            <button id="btn-copy-filter" style="padding: 8px; cursor: pointer; background: #10b981; color: white; border: none; border-radius: 4px; font-weight: bold;">Kopieren</button>
          </div>
          
          <div class="io-section" style="display: flex; gap: 8px; margin-bottom: 20px;">
            <input type="text" id="filter-import-input" placeholder="Import String hier einfügen..." style="flex: 1; padding: 8px; background: rgba(0,0,0,0.3); border: 1px solid var(--glass-border); color: white; border-radius: 4px; font-family: monospace; font-size: 0.8rem;" />
            <button id="btn-import-filter" style="padding: 8px; cursor: pointer; background: var(--accent-color); color: white; border: none; border-radius: 4px; font-weight: bold;">Importieren</button>
          </div>

          <div id="filter-checkboxes" style="max-height: 40vh; overflow-y: auto; text-align: left; display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 24px; padding-right: 8px; font-size: 0.85rem;">
            <!-- Dynamically populated JS checkboxes -->
          </div>
        </div>

        <button id="btn-save-filter" class="action-btn" style="width: 100%;">Schließen</button>
      </div>
    </div>
  </main>

  <div id="custom-tooltip" class="modern-popup"></div>

  <script type="module" src="./main.js"></script>
</body>

</html>
